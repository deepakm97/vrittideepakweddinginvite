<style>
  :root {
    /* Blush Pink & Champagne Gold Palette */
    --blush: #EAC4C4;
    --blush-soft: #FBF1EC;
    --paper: #FFFBF7;
    --rose: #EAC4C4;
    --rose-dark: #9C7A3E;
    --accent-gold: #D9B876;
    --gold-light: #F7ECDD;
    --ink: #4A363A;
    --ink-soft: #8C7377;
    --shadow: 0 25px 55px rgba(92,58,46,0.15);
    /* aliases used by the envelope block */
    --bg: #FBF1EC;
    --bg-alt: #F3E1DD;
    --accent: #C9A24C;
    --accent-light: #E3C888;
    --accent-dark: #8C6A35;
    --cream-soft: #F7ECDD;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--blush-soft);
    color: var(--ink);
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    overflow-x: hidden;
  }
  body.locked { overflow: hidden; height: 100vh; }
	

  /* ================= ENVELOPE OVERLAY ================= */
  #envelope-screen{
    position:fixed; inset:0; z-index:50;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 15% 20%, rgba(201,162,76,0.10), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(234,196,196,0.30), transparent 45%),
      var(--bg);
    transition:opacity 1.2s ease;
    cursor:pointer;
    padding:20px;
  }
  #envelope-screen.reveal{opacity:0; pointer-events:none;}

  .envelope-wrap{ perspective:1400px; }
  .envelope{
    position:relative;
    width:min(300px, 74vw);
    height:min(390px, 96vw);
  }

  .env-back{
    position:absolute; inset:0;
    background:
      repeating-linear-gradient(135deg, rgba(201,162,76,0.06) 0px, rgba(201,162,76,0.06) 1px, transparent 1px, transparent 4px),
      radial-gradient(rgba(140,106,53,0.07) 1px, transparent 1.2px),
      linear-gradient(160deg, #FFFBF7, #F6E9DE);
    background-size:auto, 5px 5px, auto;
    border:1px solid rgba(201,162,76,0.55);
    border-radius:4px;
    box-shadow:var(--shadow);
  }
  .env-back::before{
    content:"";
    position:absolute; inset:10px;
    border:1px solid rgba(201,162,76,0.35);
    pointer-events:none;
  }
  .env-back::after{
    content:"";
    position:absolute; inset:0;
    background:radial-gradient(ellipse at 50% 40%, rgba(255,255,255,0.5), transparent 65%);
    border-radius:4px;
    pointer-events:none;
    mix-blend-mode:soft-light;
  }
  .corner-sprig{
    position:absolute; width:34px; height:34px; opacity:0.85;
  }
  .corner-sprig.tl{ top:6px; left:6px; }
  .corner-sprig.tr{ top:6px; right:6px; transform:scaleX(-1); }
  .corner-sprig.bl{ bottom:6px; left:6px; transform:scaleY(-1); }
  .corner-sprig.br{ bottom:6px; right:6px; transform:scale(-1,-1); }

  .card-peek{
    position:absolute;
    left:7%; right:7%; top:6%;
    height:88%;
    background:
      radial-gradient(rgba(140,106,53,0.05) 1px, transparent 1.2px),
      var(--paper);
    background-size:5px 5px, auto;
    border:1px solid var(--accent);
    box-shadow:0 10px 24px rgba(92,58,46,0.18);
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:8px;
    overflow:hidden;
    transform:translateY(6%);
    transition:transform 0.95s cubic-bezier(.2,.8,.2,1);
    z-index:2;
    text-align:center;
  }
  .card-peek::before{
    content:"";
    position:absolute; inset:9px;
    border:1px solid var(--accent-light);
    pointer-events:none;
  }
  .card-peek .monogram{
    font-family:'Playfair Display', serif;
    font-size:1.4rem;
    font-weight:600;
    color:var(--accent-dark);
    letter-spacing:0.08em;
    opacity:0;
    transition:opacity 0.5s ease;
  }
  .card-peek span.small{
    font-size:0.62rem; letter-spacing:0.28em; text-transform:uppercase; color:var(--ink-soft);
    opacity:0;
    transition:opacity 0.5s ease;
  }
  .envelope.peek .card-peek{ transform:translateY(-52%); }
  .envelope.peek .card-peek .monogram,
  .envelope.peek .card-peek span.small{
    opacity:1;
    transition:opacity 0.6s ease 0.35s;
  }

  .flap{
    position:absolute;
    top:0; left:0; right:0;
    height:46%;
    background:
      repeating-linear-gradient(135deg, rgba(201,162,76,0.06) 0px, rgba(201,162,76,0.06) 1px, transparent 1px, transparent 4px),
      linear-gradient(165deg, #FDF5EC, #F3E2D3);
    clip-path:polygon(0 0, 100% 0, 50% 100%);
    transform-origin:top center;
    transform-style:preserve-3d;
    z-index:3;
    border:1px solid rgba(201,162,76,0.55);
    border-bottom:none;
    box-shadow:inset 0 -6px 10px -6px rgba(92,58,46,0.25);
    transition:transform 1.1s cubic-bezier(.4,.1,.2,1);
  }
  .envelope.opening .flap{ transform:rotateX(178deg); }

  .front-pocket{
    position:absolute;
    left:0; right:0; bottom:0; height:56%;
    background:
      repeating-linear-gradient(135deg, rgba(201,162,76,0.06) 0px, rgba(201,162,76,0.06) 1px, transparent 1px, transparent 4px),
      linear-gradient(160deg, #FFFBF7, #F6E9DE);
    clip-path:polygon(0 100%, 0 30%, 50% 62%, 100% 30%, 100% 100%);
    z-index:4;
    border:1px solid rgba(201,162,76,0.3);
    box-shadow:inset 0 6px 10px -6px rgba(92,58,46,0.18);
  }

  .seal-wrap{
    position:absolute; z-index:6;
    left:50%; top:46%;
    width:84px; height:96px;
    transform:translate(-50%,-50%);
    filter:drop-shadow(0 6px 8px rgba(92,58,46,0.3));
  }
  .seal{
    position:absolute; inset:0;
    transform-origin:50% 60%;
  }
  .seal svg{ width:100%; height:100%; display:block; }
  .envelope.untying .seal{
    animation:sealLift 1.05s cubic-bezier(.3,.6,.3,1) forwards;
  }
  @keyframes sealLift{
    0%{ transform:translateY(0) scale(1) rotate(0deg); opacity:1; }
    28%{ transform:translateY(2px) scale(0.95) rotate(-2deg); opacity:1; }
    100%{ transform:translateY(-34px) scale(1.2) rotate(9deg); opacity:0; }
  }

  .glow-burst{
    position:absolute; z-index:5;
    left:50%; top:46%; width:10px; height:10px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle, rgba(230,196,110,0.9), rgba(230,196,110,0) 70%);
    opacity:0;
  }
  .envelope.untying .glow-burst{
    animation:burst 0.6s ease-out forwards;
  }
  @keyframes burst{
    0%{ width:10px; height:10px; opacity:0.9; }
    100%{ width:220px; height:220px; opacity:0; }
  }

  .tap-hint{
    margin-top:26px;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:1.8rem;
    color:var(--accent-dark);
    animation:pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:.5;}50%{opacity:1;}}
  .to-line{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-size:2rem;
    color:var(--ink-soft);
    margin-bottom:18px;
    letter-spacing:0.03em;
    text-align:center;
  }

  /* ================= MAIN SITE CONTENT ================= */
  #site-content { position: relative; z-index: 1; }

  #music-toggle {
    position: fixed; bottom: 24px; right: 24px; z-index: 40;
    width: 48px; height: 48px; border-radius: 50%;
    border: 1px solid rgba(201,162,76,0.4); background: var(--paper);
    color: var(--rose-dark); box-shadow: var(--shadow); cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: transform .2s ease;
  }
  #music-toggle:hover { transform: scale(1.08); }
  #music-toggle.spinning svg { animation: spin 4s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- HERO SECTION ---------- */
  .hero {
    min-height: 90vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    padding: 40px 24px 20px;
    position: relative;
    overflow: hidden; /* For particles */
    background: 
      radial-gradient(circle at top left, #FDF6F0, transparent 40%),
      radial-gradient(circle at bottom right, #F7E7E1, transparent 40%);
  }
	/* --- WATERMARK BACKGROUND --- */
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url('RUID06a42002479c4b3e8fc0f5bd2fe4c81e.png');
    background-repeat: no-repeat;
    background-position: center;
    background-size: 60vmin;
    opacity: 0.08;
    z-index: 0;
    pointer-events: none;
  }

  /* Make sure text content sits above the particles */
  .hero-content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
	margin-top: -20px; /* Force it higher */
  }
  
  /* Hide elements initially */
  .hero-content > * {
    opacity: 0;
    transform: translateY(25px);
    transition: opacity 1.2s cubic-bezier(0.2, 0.8, 0.2, 1), transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .hero.animate-in .hero-content > * { opacity: 1; transform: translateY(0); }

  /* Cascading delay */
  .hero.animate-in .eyebrow { transition-delay: 0.6s; }
  .hero.animate-in h1 { transition-delay: 2.0s; }
  .hero.animate-in .tagline { transition-delay: 4.0s; }
  .hero.animate-in .date { transition-delay: 6.8s; }
  .hero.animate-in .tagline2 { transition-delay: 8.5s; }

  /* Refined "Save the Date" Styling */
  .hero .eyebrow { 
    font-family: 'Playfair Display', serif;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    font-size: 1.6rem;
    color: var(--rose-dark);
    font-weight: 400;
    margin-bottom: 28px;
    position: relative;
  }
  .hero .eyebrow::after {
    content: '';
    display: block;
    width: 45px;
    height: 1px;
    background: var(--accent-gold);
    margin: 14px auto 0;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: clamp(3.4rem, 10vw, 4.8rem);
    color: var(--ink);
    line-height: 1.1;
  }
  .hero h1 .amp{ color: var(--accent-gold); font-style:italic; padding:0 0.15em; }
  .hero .tagline {
    font-family: 'Parisienne', cursive;
    font-style:bold;
    font-size: clamp(1.8rem, 4.5vw, 2.4rem);
    color: var(--rose-dark);
    margin: 18px 0 26px;
  } 
	.hero .tagline2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.2rem, 2.4vw, 1.2rem);
    color: var(--rose-dark);
    margin: 60px 0 26px;
  } 
  .hero .date {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 3vw, 2.2rem);
    color: var(--ink);
    letter-spacing: 0.02em;
  }
  .hero .date.date-row{
    display:flex; align-items:center; justify-content:center; gap:10px;
  }
  .hero .date.date-row.reverse{ flex-direction:row-reverse; }
  .date-icon{ width:clamp(26px,6vw,34px); height:clamp(26px,6vw,34px); flex:none; opacity:0.92; }
  .date-icon-img{ width:auto; height:clamp(38px,9vw,58px); flex:none; opacity:0.95; object-fit:contain; }
  .date-icon-hands{ height:clamp(30px,7vw,46px); }

  /* ---------- GLITTER & PETAL PARTICLES ---------- */
  #particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    top: -20px;
    opacity: 0;
    animation: fall linear forwards;
  }
  /* Delicate Champagne Glitter */
  .particle.glitter {
    width: 5px; height: 5px;
    background: var(--accent-gold);
    border-radius: 50%;
    box-shadow: 0 0 6px 1px rgba(217,184,118,0.7);
  }
  /* Soft Blush Petal */
  .particle.petal {
    width: 14px; height: 14px;
    background: var(--rose);
    border-radius: 50% 0 50% 0; /* Petal shape */
    opacity: 0.5;
  }

  @keyframes fall {
    0% { transform: translateY(-5vh) rotate(0deg) scale(0.8); opacity: 0; }
    10% { opacity: 0.8; }
    80% { opacity: 0.8; }
    100% { transform: translateY(105vh) rotate(360deg) scale(1.2); opacity: 0; }
  }

  footer {
    padding: 60px 24px 40px; text-align: center;
    color: var(--ink-soft); font-size: 0.88rem; letter-spacing: 0.05em;
  }
  footer p { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; color: var(--rose-dark); }
  footer .credit { margin-top: 12px; font-family: 'Jost', sans-serif; font-size: 0.72rem; opacity: 0.75; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink); }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>

<script>
  const envelope = document.getElementById('envelope');
  const envelopeScreen = document.getElementById('envelope-screen');
  const bgm = document.getElementById('bgm');
  const musicToggle = document.getElementById('music-toggle');
  const body = document.body;
  let opened = false;

// --- ADD THE USER GESTURE FIX HERE ---
  document.body.addEventListener('click', () => {
    if (bgm.paused) {
        bgm.play().catch(() => {});
    }
  }, { once: true });
  
  // Particle Generation Function
  function startFlowerShower() {
    const particleContainer = document.getElementById('particles');
    const totalParticles = 45; // Number of particles on screen
    
    for (let i = 0; i < totalParticles; i++) {
      setTimeout(() => {
        createParticle(particleContainer);
      }, Math.random() * 5000); // Stagger initial spawn over 5 seconds
    }
  }

  function createParticle(container) {
    const particle = document.createElement('div');
    // 60% chance for a petal, 40% chance for glitter
    const isPetal = Math.random() > 0.4;
    particle.className = isPetal ? 'particle petal' : 'particle glitter';
    
    // Randomize starting position horizontally
    particle.style.left = Math.random() * 100 + 'vw';
    
    // Randomize duration (falling speed) between 6s and 12s
    const duration = Math.random() * 6 + 6;
    particle.style.animationDuration = duration + 's';
    
    container.appendChild(particle);
    
    // When animation ends, remove it and create a new one to keep it endless
    setTimeout(() => {
      particle.remove();
      if (!body.classList.contains('locked')) { // Keep generating if page is open
        createParticle(container);
      }
    }, duration * 1000);
  }

  envelopeScreen.addEventListener('click', () => {
    if (opened) return;
    opened = true;

    envelope.classList.add('untying');
    setTimeout(() => envelope.classList.add('opening'), 750);
    setTimeout(() => envelope.classList.add('peek'), 1750);
    
    // Fade out envelope and trigger the hero animations
    setTimeout(() => {
      envelopeScreen.classList.add('reveal');
      body.classList.remove('locked');
      
      // Trigger the cascading text animation
      document.querySelector('.hero').classList.add('animate-in');
      
      // Start the glitter & flower shower
      startFlowerShower();
      
      bgm.volume = 0.5;
      bgm.play().catch(() => {});
      musicToggle.classList.add('spinning');
    }, 2900);
    
    setTimeout(() => { envelopeScreen.style.display = 'none'; }, 4150);
  });

  musicToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    if (bgm.paused) {
      bgm.play().catch(() => {});
      musicToggle.classList.add('spinning');
    } else {
      bgm.pause();
      musicToggle.classList.remove('spinning');
    }
  });

  // Safe check for RSVP form in case you add it back later
  const rsvpForm = document.getElementById('rsvp-form');
  if (rsvpForm) {
    rsvpForm.addEventListener('submit', async function (e) {
      e.preventDefault();
      const form = e.target;
      const msg = document.getElementById('rsvp-message');
      const data = new FormData(form);
      try {
        const res = await fetch(form.action, {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          msg.textContent = 'Thank you — your RSVP has been received with love!';
        } else {
          msg.textContent = 'Hmm, something went wrong. Please try again or reach out to us directly.';
        }
      } catch (err) {
        msg.textContent = 'Hmm, something went wrong. Please try again or reach out to us directly.';
      }
      msg.style.display = 'block';
      form.reset();
    });
  }
</script>
