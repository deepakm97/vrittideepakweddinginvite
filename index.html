<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Vritti & Deepak — Save the Date</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Parisienne&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Luxury Blush & Champagne Gold Palette */
    --blush: #F7E4E7;
    --blush-soft: #FBF3F4;
    --paper: #FFFDFD;
    --rose: #DDA0A7;
    --rose-dark: #6D333B;
    --accent-gold: #DFBA73;
    --gold-light: #F4E8D1;
    --ink: #2E1A1E;
    --ink-soft: #8C7377;
    --shadow: 0 25px 55px rgba(109,51,59,0.15);
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--blush-soft);
    color: var(--ink);
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    overflow-x: hidden;
  }
  body.locked { overflow: hidden; height: 100vh; }

  /* ================= ENVELOPE OVERLAY ================= */
  #envelope-screen {
    position: fixed; inset: 0; z-index: 50;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background:
      radial-gradient(circle at 15% 20%, #F5D6DA, transparent 55%),
      radial-gradient(circle at 85% 80%, #E8CDD2, transparent 55%),
      var(--blush);
    transition: opacity 1.1s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    padding: 20px;
  }
  #envelope-screen.reveal { opacity: 0; pointer-events: none; }

  .envelope-wrap { perspective: 1600px; }
  .envelope {
    position: relative;
    width: min(340px, 82vw);
    height: min(225px, 54vw);
  }
  .env-back {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--paper) 0%, #FAEDF0 100%);
    border-radius: 8px;
    box-shadow: var(--shadow);
  }
  .env-side-shadow {
    position: absolute; inset: 0;
    background:
      linear-gradient(135deg, rgba(109,51,59,0.05) 0%, transparent 35%),
      linear-gradient(-135deg, rgba(109,51,59,0.05) 0%, transparent 35%);
    border-radius: 8px;
  }
  .card-peek {
    position: absolute; left: 5%; right: 5%; top: 6%; height: 90%;
    background: var(--paper);
    border: 1px solid rgba(223,186,115,0.35);
    border-radius: 6px;
    box-shadow: 0 10px 22px rgba(109,51,59,0.08);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px;
    transform: translateY(4%);
    transition: transform 0.85s cubic-bezier(0.15, 0.85, 0.35, 1);
    z-index: 2;
    background-image: radial-gradient(var(--blush) 0.5px, transparent 0.5px);
    background-size: 16px 16px;
  }
  .card-peek .monogram {
    font-family: 'Playfair Display', serif; font-size: 1.3rem;
    font-weight: 600; color: var(--rose-dark); letter-spacing: 0.1em;
  }
  .card-peek span.small {
    font-size: 1.4rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink-soft);
  }
  .envelope.peek .card-peek { transform: translateY(-48%); }

  .flap {
    position: absolute; top: 0; left: 0; right: 0; height: 60%;
    background: linear-gradient(160deg, var(--paper), #FAECF0);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top center; transform-style: preserve-3d; z-index: 3;
    border-top-left-radius: 8px; border-top-right-radius: 8px;
    box-shadow: 0 8px 12px rgba(109,51,59,0.06);
    transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .envelope.opening .flap { transform: rotateX(180deg); }

  .front-pocket {
    position: absolute; left: 0; right: 0; bottom: 0; height: 64%;
    background: linear-gradient(350deg, var(--paper) 0%, #FDF7F8 100%);
    clip-path: polygon(0 100%, 0 20%, 50% 70%, 100% 20%, 100% 100%); z-index: 4;
    border-bottom-left-radius: 8px; border-bottom-right-radius: 8px;
  }

  .ribbon {
    position: absolute; z-index: 5; background: var(--rose);
    box-shadow: 0 2px 5px rgba(109,51,59,0.15);
    transition: transform 0.7s ease, opacity 0.7s ease;
  }
  .ribbon.vert { left: calc(50% - 11px); top: 0; width: 22px; height: 100%; }
  .ribbon.horiz { top: calc(50% - 11px); left: 0; height: 22px; width: 100%; }
  .envelope.untying .ribbon.vert { transform: translateY(-110%); opacity: 0; }
  .envelope.untying .ribbon.horiz { transform: translateX(120%); opacity: 0; }

  .bow {
    position: absolute; z-index: 6; left: 50%; top: 50%; width: 82px; height: 82px;
    transform: translate(-50%,-50%); filter: drop-shadow(0 4px 6px rgba(109,51,59,0.2));
    transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease;
  }
  .envelope.untying .bow { transform: translate(-50%,-50%) scale(0.2) rotate(45deg); opacity: 0; }

  .tap-hint {
    margin-top: 50px; font-family: 'Parisienne', cursive; font-size: 2rem;
    color: var(--rose-dark); text-shadow: 0 1px 1px #fff;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
  
  .to-line {
    font-family: 'Playfair Display', serif; font-style: italic; font-size: 2rem;
    color: var(--ink-soft); margin-bottom: 40px; letter-spacing: 0.03em; text-align: center;
  }

  /* ================= MAIN SITE CONTENT ================= */
  #site-content { position: relative; z-index: 1; }

  #music-toggle {
    position: fixed; bottom: 24px; right: 24px; z-index: 40;
    width: 48px; height: 48px; border-radius: 50%;
    border: 1px solid rgba(223,186,115,0.4); background: var(--paper);
    color: var(--rose-dark); box-shadow: var(--shadow); cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: transform .2s ease;
  }
  #music-toggle:hover { transform: scale(1.08); }
  #music-toggle.spinning svg { animation: spin 4s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- HERO SECTION ---------- */
  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    padding: 80px 24px 60px;
    position: relative;
    overflow: hidden; /* For particles */
    background: 
      radial-gradient(circle at top left, #FFF5F6, transparent 40%),
      radial-gradient(circle at bottom right, #F5E6E8, transparent 40%);
  }

  /* Make sure text content sits above the particles */
  .hero-content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  
  /* Hide elements initially */
  .hero-content > * {
    opacity: 0;
    transform: translateY(25px);
    transition: opacity 1.2s cubic-bezier(0.2, 0.8, 0.2, 1), transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .hero.animate-in .hero-content > * { opacity: 1; transform: translateY(0); }

  /* Cascading delay */
  .hero.animate-in .eyebrow { transition-delay: 0.6s; }
  .hero.animate-in h1 { transition-delay: 1.2s; }
  .hero.animate-in .tagline { transition-delay: 2.0s; }
  .hero.animate-in .date { transition-delay: 2.8s; }

  /* Refined "Save the Date" Styling */
  .hero .eyebrow { 
    font-family: 'Playfair Display', serif;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    font-size: 1.6rem; /* INCREASED FONT SIZE HERE */
    color: var(--rose-dark);
    font-weight: 400;
    margin-bottom: 28px;
    position: relative;
  }
  .hero .eyebrow::after {
    content: '';
    display: block;
    width: 45px;
    height: 1px;
    background: var(--accent-gold);
    margin: 14px auto 0;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: clamp(3.4rem, 10vw, 4.8rem);
    color: var(--ink);
    line-height: 1.1;
  }
  .hero h1 .amp { color: var(--accent-gold); font-family: 'Parisienne', cursive; font-size: 1.1em; padding: 0 0.1em; }
  .hero .tagline {
    font-family: 'Parisienne', cursive;
    font-size: clamp(1.4rem, 4.5vw, 2rem);
    color: var(--rose-dark);
    margin: 18px 0 26px;
  }
  .hero .date {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 3vw, 2.2rem); /* Increased Size */
    color: var(--ink);
    letter-spacing: 0.05em;
  }

  /* ---------- GLITTER & PETAL PARTICLES ---------- */
  #particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    top: -20px;
    opacity: 0;
    animation: fall linear forwards;
  }
  /* Delicate Golden Glitter */
  .particle.glitter {
    width: 5px; height: 5px;
    background: var(--accent-gold);
    border-radius: 50%;
    box-shadow: 0 0 6px 1px rgba(223,186,115,0.7);
  }
  /* Soft Blush Petal */
  .particle.petal {
    width: 14px; height: 14px;
    background: var(--rose);
    border-radius: 50% 0 50% 0; /* Petal shape */
    opacity: 0.5;
  }

  @keyframes fall {
    0% { transform: translateY(-5vh) rotate(0deg) scale(0.8); opacity: 0; }
    10% { opacity: 0.8; }
    80% { opacity: 0.8; }
    100% { transform: translateY(105vh) rotate(360deg) scale(1.2); opacity: 0; }
  }

  footer {
    padding: 60px 24px 40px; text-align: center;
    color: var(--ink-soft); font-size: 0.88rem; letter-spacing: 0.05em;
  }
  footer p { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; color: var(--rose-dark); }
  footer .credit { margin-top: 12px; font-family: 'Jost', sans-serif; font-size: 0.72rem; opacity: 0.75; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink); }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body class="locked">

<div id="envelope-screen">
  <p class="to-line">For our beloved family & friends</p>
  <div class="envelope-wrap">
    <div class="envelope" id="envelope">
      <div class="env-back"></div>
      <div class="env-side-shadow"></div>
      <div class="card-peek">
        <span class="small">Save the Date</span>
        <span class="monogram">V &amp; D</span>
      </div>
      <div class="front-pocket"></div>
      <div class="flap"></div>
      <div class="ribbon vert"></div>
      <div class="ribbon horiz"></div>
      <svg class="bow" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <path d="M40 40 C20 15, 2 22, 5 40 C2 58, 20 65, 40 40 Z" fill="#DDA0A7" stroke="#6D333B" stroke-width="1"/>
        <path d="M40 40 C60 15, 78 22, 75 40 C78 58, 60 65, 40 40 Z" fill="#DDA0A7" stroke="#6D333B" stroke-width="1"/>
        <circle cx="40" cy="40" r="8" fill="#6D333B"/>
        <path d="M35 45 L25 70 L36 62 Z" fill="#DDA0A7" stroke="#6D333B" stroke-width="1"/>
        <path d="M45 45 L55 70 L44 62 Z" fill="#DDA0A7" stroke="#6D333B" stroke-width="1"/>
      </svg>
    </div>
  </div>
  <p class="tap-hint">tap invitation to open</p>
</div>

<div id="site-content">

  <audio id="bgm" loop preload="none">
    <source src="https://www.bensound.com/bensound-music/bensound-tenderness.mp3" type="audio/mpeg">
  </audio>

  <button id="music-toggle" aria-label="Toggle music" title="Toggle music">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M9 18V5l12-2v13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="6" cy="18" r="3" stroke="currentColor" stroke-width="1.8"/>
      <circle cx="18" cy="16" r="3" stroke="currentColor" stroke-width="1.8"/>
    </svg>
  </button>

  <section class="hero">
    <!-- Particle container injected via JS -->
    <div id="particles"></div>
    
    <div class="hero-content">
      <p class="eyebrow">Save the Date</p>
      <h1>Vritti<span class="amp">&amp;</span>Deepak</h1>
      <p class="tagline">are getting married</p>
      <p class="date">13 December 2026</p>
    </div>
  </section>

  <footer>
    <p>With love, Vritti &amp; Deepak</p>
    <p class="credit">Music: “Tenderness” by Bensound.com</p>
  </footer>

</div>

<script>
  const envelope = document.getElementById('envelope');
  const envelopeScreen = document.getElementById('envelope-screen');
  const bgm = document.getElementById('bgm');
  const musicToggle = document.getElementById('music-toggle');
  const body = document.body;
  let opened = false;

  // Particle Generation Function
  function startFlowerShower() {
    const particleContainer = document.getElementById('particles');
    const totalParticles = 45; // Number of particles on screen
    
    for (let i = 0; i < totalParticles; i++) {
      setTimeout(() => {
        createParticle(particleContainer);
      }, Math.random() * 5000); // Stagger initial spawn over 5 seconds
    }
  }

  function createParticle(container) {
    const particle = document.createElement('div');
    // 60% chance for a petal, 40% chance for glitter
    const isPetal = Math.random() > 0.4;
    particle.className = isPetal ? 'particle petal' : 'particle glitter';
    
    // Randomize starting position horizontally
    particle.style.left = Math.random() * 100 + 'vw';
    
    // Randomize duration (falling speed) between 6s and 12s
    const duration = Math.random() * 6 + 6;
    particle.style.animationDuration = duration + 's';
    
    container.appendChild(particle);
    
    // When animation ends, remove it and create a new one to keep it endless
    setTimeout(() => {
      particle.remove();
      if (!body.classList.contains('locked')) { // Keep generating if page is open
        createParticle(container);
      }
    }, duration * 1000);
  }

  envelopeScreen.addEventListener('click', () => {
    if (opened) return;
    opened = true;

    envelope.classList.add('untying');
    setTimeout(() => envelope.classList.add('opening'), 550);
    setTimeout(() => envelope.classList.add('peek'), 1250);
    
    // Fade out envelope and trigger the hero animations
    setTimeout(() => {
      envelopeScreen.classList.add('reveal');
      body.classList.remove('locked');
      
      // Trigger the cascading text animation
      document.querySelector('.hero').classList.add('animate-in');
      
      // Start the glitter & flower shower
      startFlowerShower();
      
      bgm.volume = 0.4;
      bgm.play().catch(() => {});
      musicToggle.classList.add('spinning');
    }, 1900);
    
    setTimeout(() => { envelopeScreen.style.display = 'none'; }, 10000);
  });

  musicToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    if (bgm.paused) {
      bgm.play().catch(() => {});
      musicToggle.classList.add('spinning');
    } else {
      bgm.pause();
      musicToggle.classList.remove('spinning');
    }
  });

  // Safe check for RSVP form in case you add it back later
  const rsvpForm = document.getElementById('rsvp-form');
  if (rsvpForm) {
    rsvpForm.addEventListener('submit', async function (e) {
      e.preventDefault();
      const form = e.target;
      const msg = document.getElementById('rsvp-message');
      const data = new FormData(form);
      try {
        const res = await fetch(form.action, {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          msg.textContent = 'Thank you — your RSVP has been received with love!';
        } else {
          msg.textContent = 'Hmm, something went wrong. Please try again or reach out to us directly.';
        }
      } catch (err) {
        msg.textContent = 'Hmm, something went wrong. Please try again or reach out to us directly.';
      }
      msg.style.display = 'block';
      form.reset();
    });
  }
</script>
</body>
</html>
